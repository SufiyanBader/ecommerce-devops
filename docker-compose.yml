services:
  user-db:
    image: postgres:15
    container_name: user-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build:
      context: ./user-service
    container_name: user-service
    environment:
      DATABASE_URL: postgresql://user:password@user-db:5432/userdb
      SECRET_KEY: supersecretkey123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
    ports:
      - "8001:8001"
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  product-db:
    image: postgres:15
    container_name: product-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: productdb
    ports:
      - "5433:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d productdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  product-service:
    build:
      context: ./product-service
    container_name: product-service
    environment:
      DATABASE_URL: postgresql://user:password@product-db:5432/productdb
    ports:
      - "8002:8002"
    depends_on:
      product-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orderdb
    ports:
      - "5434:5432"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    environment:
      DATABASE_URL: postgresql://user:password@order-db:5432/orderdb
    ports:
      - "8003:8003"
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - ecommerce-net

  notification-redis:
    image: redis:7-alpine
    container_name: notification-redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-net

  notification-service:
    build:
      context: ./notification-service
    container_name: notification-service
    environment:
      REDIS_URL: redis://notification-redis:6379
    ports:
      - "8004:8004"
    depends_on:
      - notification-redis
    networks:
      - ecommerce-net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
    networks:
      - ecommerce-net

networks:
  ecommerce-net:
    driver: bridge