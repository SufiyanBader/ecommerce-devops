apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: {{ .Values.orderService.replicaCount }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: "{{ .Values.dockerhubUsername }}/order-service:{{ .Values.orderService.image.tag }}"
          ports:
            - containerPort: {{ .Values.orderService.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.orderService.database.user }}:{{ .Values.orderService.database.password }}@order-db:5432/{{ .Values.orderService.database.name }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.orderService.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: {{ .Values.orderService.port }}
      targetPort: {{ .Values.orderService.port }}
  type: ClusterIP