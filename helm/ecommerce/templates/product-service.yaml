apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: {{ .Values.productService.replicaCount }}
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: "{{ .Values.dockerhubUsername }}/product-service:{{ .Values.productService.image.tag }}"
          ports:
            - containerPort: {{ .Values.productService.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.productService.database.user }}:{{ .Values.productService.database.password }}@product-db:5432/{{ .Values.productService.database.name }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.productService.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: {{ .Values.productService.port }}
      targetPort: {{ .Values.productService.port }}
  type: ClusterIP