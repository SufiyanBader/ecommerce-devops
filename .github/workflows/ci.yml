name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install user-service dependencies
        run: |
          cd user-service
          pip install -r requirements.txt

      - name: Install product-service dependencies
        run: |
          cd product-service
          pip install -r requirements.txt

      - name: Install order-service dependencies
        run: |
          cd order-service
          pip install -r requirements.txt

      - name: Install notification-service dependencies
        run: |
          cd notification-service
          pip install -r requirements.txt

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push user-service
        uses: docker/build-push-action@v6
        with:
          context: ./user-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/user-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/user-service:${{ github.sha }}

      - name: Build and push product-service
        uses: docker/build-push-action@v6
        with:
          context: ./product-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/product-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/product-service:${{ github.sha }}

      - name: Build and push order-service
        uses: docker/build-push-action@v6
        with:
          context: ./order-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }}

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest,${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ github.sha }}

      - name: Build and push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./api-gateway
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:latest,${{ secrets.DOCKERHUB_USERNAME }}/api-gateway:${{ github.sha }}

  notify-success:
    runs-on: ubuntu-latest
    needs: test-and-build
    if: success()
    steps:
      - name: Pipeline success
        run: echo "✅ All images built and pushed to Docker Hub successfully"